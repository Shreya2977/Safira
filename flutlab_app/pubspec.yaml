name: safira
description: A women safety app
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.6
  
  # Location services
  geolocator: ^10.1.0
  
  # Permission handling
  permission_handler: ^10.4.4
  
  # Maps (optional)
  google_maps_flutter: ^2.5.0
  
  # State management
  provider: ^6.1.1
  
  # Notifications
  flutter_local_notifications: ^16.1.2
  
  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/